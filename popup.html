<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Keeper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1>Bookmark Keeper</h1>
      <div class="actions">
        <button id="sortButton" type="button">Sort by domain</button>
        <button id="groupButton" class="secondary" type="button">Group by domain</button>
        <button id="miscGroupButton" class="secondary" type="button">Group ungrouped into misc</button>
        <button id="ungroupButton" class="tertiary" type="button">Ungroup tabs</button>
      </div>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
